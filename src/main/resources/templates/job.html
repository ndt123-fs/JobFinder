<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title th:text="${name}">Hỏi Dân IT - Elite Edition</title>
  </head>

  <body
    style="
      margin: 0;
      padding: 0;
      background: #0f172a;
      font-family: &quot;Segoe UI&quot;, Arial, sans-serif;
    "
  >
    <table width="100%" cellpadding="0" cellspacing="0" style="padding: 40px 0">
      <tr>
        <td align="center">
          <!-- MAIN CONTAINER -->
          <table
            width="700"
            cellpadding="0"
            cellspacing="0"
            style="
              background: #111827;
              border-radius: 18px;
              overflow: hidden;
              box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
            "
          >
            <!-- HEADER -->
            <tr>
              <td
                style="
                  padding: 25px 30px;
                  background: linear-gradient(90deg, #6366f1, #a855f7);
                  color: white;
                "
              >
                <table width="100%">
                  <tr>
                    <td style="font-size: 22px; font-weight: bold">
                      💻 Itech Developer
                    </td>
                    <td align="right" style="font-size: 14px">
                      Elite Tech Jobs 🚀
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <!-- GREETING -->
            <tr>
              <td style="padding: 35px 30px 20px 30px; color: #e5e7eb">
                <h2 style="margin: 0; font-weight: 600">
                  Hi <span style="color: #818cf8" th:text="${namee}"></span> 👋
                </h2>
                <p style="color: #9ca3af; font-size: 15px; margin-top: 10px">
                  Những cơ hội dưới đây có thể là bước nhảy vọt sự nghiệp của
                  bạn trong thế giới IT.
                </p>
              </td>
            </tr>

            <!-- JOB LIST -->
            <tr>
              <td style="padding: 0 30px 30px 30px">
                <table width="100%" cellpadding="0" cellspacing="0">
                  <tr th:each="job : ${jobs}">
                    <td
                      style="
                        background: #1f2937;
                        border-radius: 14px;
                        padding: 20px;
                        margin-bottom: 20px;
                        display: block;
                        border: 1px solid #2d3748;
                      "
                    >
                      <!-- TITLE -->
                      <div
                        style="
                          font-size: 18px;
                          font-weight: 600;
                          margin-bottom: 5px;
                        "
                      >
                        <a
                          href="https://www.facebook.com/iTn.131105"
                          target="_blank"
                          style="color: #818cf8; text-decoration: none"
                          th:text="${job.name}"
                        >
                        </a>
                      </div>

                      <!-- COMPANY -->
                      <div
                        style="font-size: 14px; color: #9ca3af"
                        th:text="${job.company.name}"
                      ></div>

                      <!-- SALARY -->
                      <div
                        style="
                          margin-top: 8px;
                          font-weight: bold;
                          color: #22d3ee;
                          font-size: 15px;
                        "
                      >
                        <span
                          th:text="${#numbers.formatDecimal(job.salary, 0, 'COMMA', 0, 'POINT')}"
                        ></span>
                        đ
                      </div>

                      <!-- SKILLS -->
                      <div style="margin-top: 12px">
                        <span
                          th:each="skill : ${job.skills}"
                          th:text="${skill.name}"
                          style="
                            display: inline-block;
                            margin-right: 6px;
                            margin-bottom: 6px;
                            padding: 6px 12px;
                            font-size: 12px;
                            border-radius: 20px;
                            background: linear-gradient(
                              90deg,
                              #4f46e5,
                              #9333ea
                            );
                            color: white;
                          "
                        >
                        </span>
                      </div>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <!-- CTA BUTTON -->
            <tr>
              <td align="center" style="padding: 30px">
                <a
                  href="https://www.facebook.com/iTn.131105"
                  target="_blank"
                  style="
                    display: inline-block;
                    padding: 14px 40px;
                    border-radius: 40px;
                    font-size: 15px;
                    font-weight: bold;
                    text-decoration: none;
                    color: white;
                    background: linear-gradient(90deg, #6366f1, #a855f7);
                    box-shadow: 0 10px 30px rgba(99, 102, 241, 0.5);
                  "
                >
                  🚀 Xem thêm job HOT
                </a>
              </td>
            </tr>

            <!-- FOOTER -->
            <tr>
              <td
                style="
                  background: #0b1120;
                  padding: 20px 30px;
                  text-align: center;
                  color: #6b7280;
                  font-size: 13px;
                "
              >
                Keep coding. Keep growing. 💜<br />
                <strong style="color: #a5b4fc">Eric</strong>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
